<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- House/building icon -->
  <g transform="translate(4, 4)">
    <!-- Roof -->
    <polygon points="26,4 4,20 48,20" fill="#c9a84c"/>
    <!-- Building body -->
    <rect x="8" y="20" width="36" height="28" fill="#1a1a2e"/>
    <!-- Door -->
    <rect x="19" y="32" width="10" height="16" fill="#c9a84c"/>
    <!-- Windows -->
    <rect x="10" y="24" width="8" height="6" fill="#c9a84c" opacity="0.7"/>
    <rect x="34" y="24" width="8" height="6" fill="#c9a84c" opacity="0.7"/>
    <!-- Chimney -->
    <rect x="36" y="10" width="5" height="10" fill="#1a1a2e"/>
  </g>
  <!-- Brand text -->
  <text x="62" y="26" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1a1a2e" letter-spacing="3">DE MAIZON</text>
  <text x="62" y="42" font-family="Arial, sans-serif" font-size="7.5" fill="#c9a84c" letter-spacing="2">INTERIORS &amp; CONSTRUCTIONS</text>
</svg>
